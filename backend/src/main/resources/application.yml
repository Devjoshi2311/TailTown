spring:
  profiles:
    active: dev
  application:
    name: tailtown-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tailtown}
    username: ${DB_USER:tailtown}
    password: ${DB_PASSWORD:tailtown}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      # A SPRING_DATA_REDIS_URL env var (e.g. redis://:password@host:port, rediss:// for TLS) is picked
      # up automatically via Spring Boot's relaxed env-var binding and takes precedence over the discrete
      # host/port/password below. Deliberately no `url:` line here — an empty-string default (${VAR:})
      # is NOT treated as "unset" by Spring's Redis config and crashes at boot when the var is absent.
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
  cache:
    type: redis
    redis:
      time-to-live: 3600000
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

jwt:
  private-key: ${JWT_PRIVATE_KEY:}
  public-key: ${JWT_PUBLIC_KEY:}
  access-token-expiry-seconds: 900
  refresh-token-expiry-days: 30

firebase:
  credentials-json: ${FIREBASE_CREDENTIALS_JSON:}

razorpay:
  key-id: ${RAZORPAY_KEY_ID:}
  key-secret: ${RAZORPAY_KEY_SECRET:}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

server:
  port: ${PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

logging:
  level:
    com.tailtown: INFO
    org.springframework.security: WARN

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
